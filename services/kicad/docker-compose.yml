version: '3.8'

services:
  kicad:
    build:
      context: .
      dockerfile: Dockerfile
      # circuit_synth/ est copié dans l'image et installé via pip (voir Dockerfile)
    image: layrix-kicad:latest
    container_name: layrix-kicad
    ports:
      - '8766:8766'
    volumes:
      - kicad-jobs:/tmp/kicad-jobs
    environment:
      - PYTHONUNBUFFERED=1
      - KICAD_SYMBOL_DIR=/usr/share/kicad/symbols
      - KICAD_FOOTPRINT_DIR=/usr/share/kicad/footprints
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8766/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kicad-jobs:
