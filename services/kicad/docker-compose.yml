version: '3.8'

services:
  kicad:
    build: .
    image: layrix-kicad:latest
    container_name: layrix-kicad
    ports:
      - '8000:8000'
    volumes:
      - kicad-jobs:/tmp/kicad-jobs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kicad-jobs:
