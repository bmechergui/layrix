services:
  kicad:
    build:
      context: .
      dockerfile: Dockerfile
      # circuit_synth/ + kicad-tools/ sont copiés dans l'image (fallback prod sans mount).
      # En dev les bind-mounts ci-dessous rendent le code éditable LIVE depuis l'hôte.
    image: layrix-kicad:latest
    container_name: layrix-kicad
    ports:
      - '8766:8766'
    volumes:
      - kicad-jobs:/tmp/kicad-jobs
      # kicad-tools OFFICIEL en éditable : code Python live + le backend natif C++
      # (re)buildé par docker-entrypoint.sh au démarrage (le mount masque le .so de
      # l'image). Le .so compilé persiste ici côté hôte (gitignored) → builds suivants
      # instantanés. ⚠️ chemin = /opt/kicad-tools (cf. Dockerfile pip install -e).
      - ./kicad-tools:/opt/kicad-tools
      # Code du service FastAPI éditable live (reasoner, routers…). Restart du conteneur
      # pour prise en compte (uvicorn --workers, pas de --reload pour rester thread-safe).
      - ./tools:/app/tools
      - ./routers:/app/routers
      - ./main.py:/app/main.py
    environment:
      - PYTHONUNBUFFERED=1
      - KICAD_SYMBOL_DIR=/usr/share/kicad/symbols
      - KICAD_FOOTPRINT_DIR=/usr/share/kicad/footprints
      - FREEROUTING_API_URL=http://127.0.0.1:37864
      # Reasoner IA (call_agent_reason → PCBReasoningAgent + Claude Haiku). Sans cette
      # clé, le service retombe sur `kct reason --auto-route` (heuristique sans LLM).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8766/health']
      interval: 30s
      timeout: 10s
      retries: 3
      # 1er démarrage en dev : build du backend natif (cmake+g++) avant de servir.
      start_period: 180s

volumes:
  kicad-jobs:
