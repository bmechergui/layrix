<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Layrix — Schéma KiCad</title>
  <script type="module" src="/kicanvas.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A0A0A;color:#ccc;font-family:ui-monospace,Menlo,monospace;
         display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* ── Toolbar ── */
    .toolbar{
      display:flex;align-items:center;gap:6px;
      padding:5px 12px;background:#0E0E0E;border-bottom:1px solid #222;
      flex-shrink:0;
    }
    .toolbar-title{font-size:12px;color:#D4820A;font-weight:600;margin-right:6px}
    .sep{width:1px;height:20px;background:#333;margin:0 4px}

    /* Circuit tabs */
    .tab{
      padding:4px 12px;cursor:pointer;border:1px solid #333;border-radius:4px;
      font-size:11px;color:#888;background:transparent;font-family:inherit;
      transition:all .15s;
    }
    .tab:hover{color:#bbb;border-color:#555}
    .tab.active{border-color:#D4820A;color:#D4820A;background:rgba(212,130,10,.10)}

    /* Zoom / Fullscreen buttons */
    .spacer{flex:1}
    .btn{
      display:flex;align-items:center;justify-content:center;
      width:28px;height:28px;border-radius:4px;cursor:pointer;
      border:1px solid #333;background:#161616;color:#aaa;
      font-size:14px;font-family:inherit;transition:all .15s;
      user-select:none;
    }
    .btn:hover{border-color:#555;color:#eee;background:#222}
    .btn-label{font-size:10px;color:#666;margin-left:2px}

    /* Viewer */
    .viewer{flex:1;position:relative;min-height:0;overflow:hidden}
    kicanvas-embed{display:block;width:100%;height:100%}

    /* Fullscreen mode */
    body.fullscreen .toolbar{display:none}
    body.fullscreen .viewer{height:100vh}
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Layrix · KiCanvas</span>
    <div class="sep"></div>

    <!-- Circuit selector -->
    <button class="tab active" data-key="lm7805">LM7805</button>
    <button class="tab" data-key="ne555">NE555</button>
    <button class="tab" data-key="esp32">ESP32</button>

    <div class="spacer"></div>

    <!-- Zoom controls -->
    <button class="btn" id="btn-zoomin"  title="Zoom +" >+</button>
    <button class="btn" id="btn-zoomout" title="Zoom −" >−</button>
    <button class="btn" id="btn-fit"     title="Zoom to fit" style="font-size:11px;width:auto;padding:0 8px">Fit</button>
    <div class="sep"></div>
    <button class="btn" id="btn-fs"      title="Plein écran" >⛶</button>
  </div>

  <div class="viewer" id="container">
    <kicanvas-embed id="kv" src="/test-lm7805.kicad_sch" controls="full" theme="dark"></kicanvas-embed>
  </div>

  <script>
    const FILES = {
      lm7805: '/test-lm7805.kicad_sch',
      ne555:  '/test-ne555.kicad_sch',
      esp32:  '/test-esp32.kicad_sch',
    };

    // ── Auto-zoom after KiCanvas finishes loading ───────────────
    function waitAndZoom(kvEl) {
      // Poll until the internal viewer + document are ready, then zoom
      let attempts = 0;
      const poll = setInterval(() => {
        attempts++;
        const app    = kvEl.shadowRoot?.querySelector('kc-schematic-app');
        const viewer = app?.shadowRoot?.querySelector('kc-schematic-viewer');
        const v      = viewer?.viewer;
        if (v?.document?.net_labels?.length > 0) {
          clearInterval(poll);
          setTimeout(zoomToComponents, 100); // small delay for final render
        }
        if (attempts > 80) clearInterval(poll); // 4s timeout
      }, 50);
    }

    // ── Tab switching ──────────────────────────────────────────
    function show(key) {
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.key === key));
      const parent = document.getElementById('container');
      const old    = document.getElementById('kv');
      const next   = document.createElement('kicanvas-embed');
      next.id = 'kv';
      next.setAttribute('src', FILES[key]);
      next.setAttribute('controls', 'full');
      next.setAttribute('theme', 'dark');
      parent.replaceChild(next, old);
      waitAndZoom(next);
    }
    document.querySelectorAll('.tab').forEach(t =>
      t.addEventListener('click', () => show(t.dataset.key)));

    // Auto-zoom on initial load
    waitAndZoom(document.getElementById('kv'));

    // ── Shadow DOM helpers ──────────────────────────────────────────────────────
    function deepQueryCanvas(root) {
      const c = root.querySelector('canvas');
      if (c) return c;
      for (const el of root.querySelectorAll('*')) {
        if (el.shadowRoot) { const f = deepQueryCanvas(el.shadowRoot); if (f) return f; }
      }
      return null;
    }
    function getCanvas() {
      const kv = document.getElementById('kv');
      return (kv.shadowRoot && deepQueryCanvas(kv.shadowRoot)) || kv;
    }
    function getSchematicViewer() {
      const kv = document.getElementById('kv');
      const app = kv.shadowRoot?.querySelector('kc-schematic-app');
      return app?.shadowRoot?.querySelector('kc-schematic-viewer');
    }

    // ── Smart zoom: fit components only, exclude title block ───────────────────
    // Discovered via Chrome DevTools:
    //   v.viewport.camera = Vec2 center + number zoom
    //   trigger render with v.draw() + v.on_viewport_change() + tiny WheelEvent
    function zoomToComponents() {
      const viewer = getSchematicViewer();
      if (!viewer) return;
      const v = viewer.viewer;
      if (!v) return;
      const cam = v.viewport.camera;
      const doc = v.document;
      if (!doc?.paper) return;

      const vpW = cam.viewport_size.x;
      const vpH = cam.viewport_size.y;
      const paperW = doc.paper.width;
      const paperH = doc.paper.height;

      // Build tight bbox from all schematic items (labels + wire endpoints + symbols)
      let minX = paperW, minY = paperH, maxX = 0, maxY = 0;
      function upd(x, y) {
        if (x != null && y != null && isFinite(x) && isFinite(y)) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
      }
      for (const lbl of (doc.net_labels  || [])) upd(lbl.at?.x, lbl.at?.y);
      for (const w   of (doc.wires       || [])) for (const pt of (w.pts||[])) upd(pt.x, pt.y);
      for (const sym of (doc.symbols     || [])) upd(sym.at?.x, sym.at?.y);

      if (minX >= maxX || minY >= maxY) { v.zoom_to_page(); return; }

      const PAD_H = 12, PAD_V = 8;
      const bx1 = Math.max(0, minX - PAD_H);
      const bx2 = Math.min(paperW, maxX + PAD_H);
      const by1 = Math.max(0, minY - PAD_V);
      const by2 = maxY + PAD_V;
      const bw = bx2 - bx1, bh = by2 - by1;
      const cx = (bx1 + bx2) / 2;
      const cy = (by1 + by2) / 2;

      // Fit by HEIGHT with 15% margin → title block (bottom 30% of paper) guaranteed off-screen.
      // Schematic aspect ratio > viewport → width-fit would leak title block; height-fit is safe.
      const zoom = (vpH / bh) * 0.85;

      // Modify Vec2 IN PLACE (don't replace the object — breaks internal methods)
      cam.center.x = cx;
      cam.center.y = cy;
      cam.zoom     = zoom;

      // Trigger KiCanvas render (discovered via DevTools: draw + on_viewport_change + micro-wheel)
      try { v.draw(); }              catch(_) {}
      try { v.on_viewport_change(); } catch(_) {}
      const canvas = deepQueryCanvas(viewer.shadowRoot);
      if (canvas) {
        const r = canvas.getBoundingClientRect();
        canvas.dispatchEvent(new WheelEvent('wheel', {
          bubbles: true, cancelable: true,
          clientX: r.left + r.width/2, clientY: r.top + r.height/2,
          deltaY: 0.001, deltaMode: 0, ctrlKey: false,
        }));
      }
    }

    function sendKey(key, opts = {}) {
      const target = getCanvas();
      target.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true, cancelable: true, ...opts }));
      target.dispatchEvent(new KeyboardEvent('keyup',   { key, bubbles: true, cancelable: true, ...opts }));
    }
    function wheelZoom(delta) {
      const canvas = getCanvas();
      const rect = canvas.getBoundingClientRect();
      canvas.dispatchEvent(new WheelEvent('wheel', {
        bubbles: true, cancelable: true,
        clientX: rect.left + rect.width  / 2,
        clientY: rect.top  + rect.height / 2,
        deltaY: delta, deltaMode: 0, ctrlKey: true,
      }));
    }

    document.getElementById('btn-zoomin') .addEventListener('click', () => wheelZoom(-200));
    document.getElementById('btn-zoomout').addEventListener('click', () => wheelZoom( 200));
    // Fit = smart zoom on component bbox (NOT zoom_to_page which shows title block)
    document.getElementById('btn-fit').addEventListener('click', zoomToComponents);

    // ── Fullscreen ─────────────────────────────────────────────
    const fsBtn = document.getElementById('btn-fs');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        document.body.classList.add('fullscreen');
        fsBtn.textContent = '✕';
        fsBtn.title = 'Quitter plein écran';
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('fullscreen');
        fsBtn.textContent = '⛶';
        fsBtn.title = 'Plein écran';
      }
    });
    // ESC also exits fullscreen class
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.body.classList.remove('fullscreen');
    });
  </script>
</body>
</html>
