<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100" fill="none" role="img" aria-label="Cirqix">
  <!-- Placeholder Cirqix — wordmark + icone circuit "C" (a remplacer par le visuel final) -->
  <defs>
    <linearGradient id="cirqixCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00C2FF" />
      <stop offset="1" stop-color="#00E5FF" />
    </linearGradient>
  </defs>

  <!-- Icone "C" -->
  <g transform="translate(2 2) scale(0.96)">
    <g stroke="#19B7EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M70 24 H46 C28 24 28 76 46 76 H70" />
      <path d="M70 24 H86" />
      <path d="M70 76 H86" />
    </g>
    <g fill="#19B7EE">
      <circle cx="86" cy="24" r="5" />
      <circle cx="86" cy="76" r="5" />
      <circle cx="29" cy="50" r="5" />
    </g>
    <g fill="none" stroke="#19B7EE" stroke-width="5">
      <circle cx="70" cy="24" r="8" />
      <circle cx="70" cy="76" r="8" />
    </g>
  </g>

  <!-- Wordmark -->
  <text x="108" y="70"
        font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="-2">
    <tspan fill="#FDFDFD">Cir</tspan><tspan fill="url(#cirqixCyan)">qix</tspan>
  </text>
</svg>
